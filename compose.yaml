services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${COCO_DB_NAME:-coco}
      POSTGRES_USER: ${COCO_DB_USER:-coco}
      POSTGRES_PASSWORD: ${COCO_DB_PASSWORD:-coco-local}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - coco-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${COCO_DB_USER:-coco} -d ${COCO_DB_NAME:-coco}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  coco-postgres-data:
