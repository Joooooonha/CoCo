spring:
  application:
    name: CoCoServer
  datasource:
    url: ${COCO_DB_URL:jdbc:postgresql://localhost:5432/coco}
    username: ${COCO_DB_USER:coco}
    password: ${COCO_DB_PASSWORD:coco-local}
    hikari:
      maximum-pool-size: ${COCO_DB_POOL_MAX_SIZE:10}
      minimum-idle: ${COCO_DB_POOL_MIN_IDLE:2}
      connection-timeout: ${COCO_DB_POOL_CONNECTION_TIMEOUT_MS:3000}
      validation-timeout: ${COCO_DB_POOL_VALIDATION_TIMEOUT_MS:1000}
      idle-timeout: ${COCO_DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${COCO_DB_POOL_MAX_LIFETIME_MS:1800000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 20s
  servlet:
    multipart:
      max-file-size: 256KB
      max-request-size: 256KB

server:
  shutdown: graceful
  max-http-request-header-size: 8KB
  tomcat:
    threads:
      max: ${COCO_TOMCAT_MAX_THREADS:50}
      min-spare: ${COCO_TOMCAT_MIN_SPARE_THREADS:5}
      max-queue-capacity: ${COCO_TOMCAT_MAX_QUEUE_CAPACITY:50}
    max-connections: ${COCO_TOMCAT_MAX_CONNECTIONS:200}
    accept-count: ${COCO_TOMCAT_ACCEPT_COUNT:50}
    connection-timeout: 5s
    keep-alive-timeout: 15s
    max-keep-alive-requests: 100
    max-http-form-post-size: 256KB
    max-swallow-size: 256KB
  error:
    include-message: never
    include-stacktrace: never

coco:
  http:
    max-request-body-bytes: ${COCO_HTTP_MAX_REQUEST_BODY_BYTES:262144}

management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
