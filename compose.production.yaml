name: coco

x-logging: &default-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${COCO_DB_NAME:-coco}
      POSTGRES_USER: ${COCO_DB_USER:-coco}
      POSTGRES_PASSWORD: "${COCO_DB_PASSWORD:?COCO_DB_PASSWORD must be set}"
    volumes:
      - coco-postgres-production-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${COCO_DB_USER:-coco} -d ${COCO_DB_NAME:-coco}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: ${COCO_POSTGRES_MEMORY_LIMIT:-768m}
    cpus: "${COCO_POSTGRES_CPU_LIMIT:-1.0}"
    pids_limit: 256
    logging: *default-logging

  api:
    build:
      context: ./server
    image: coco-api:local
    environment:
      COCO_DB_URL: jdbc:postgresql://postgres:5432/${COCO_DB_NAME:-coco}
      COCO_DB_USER: ${COCO_DB_USER:-coco}
      COCO_DB_PASSWORD: "${COCO_DB_PASSWORD:?COCO_DB_PASSWORD must be set}"
      COCO_DB_POOL_MAX_SIZE: ${COCO_DB_POOL_MAX_SIZE:-10}
      COCO_DB_POOL_MIN_IDLE: ${COCO_DB_POOL_MIN_IDLE:-2}
      COCO_HTTP_MAX_REQUEST_BODY_BYTES: ${COCO_HTTP_MAX_REQUEST_BODY_BYTES:-262144}
      COCO_TOMCAT_MAX_THREADS: ${COCO_TOMCAT_MAX_THREADS:-50}
      COCO_TOMCAT_MIN_SPARE_THREADS: ${COCO_TOMCAT_MIN_SPARE_THREADS:-5}
      COCO_TOMCAT_MAX_QUEUE_CAPACITY: ${COCO_TOMCAT_MAX_QUEUE_CAPACITY:-50}
      COCO_TOMCAT_MAX_CONNECTIONS: ${COCO_TOMCAT_MAX_CONNECTIONS:-200}
      COCO_TOMCAT_ACCEPT_COUNT: ${COCO_TOMCAT_ACCEPT_COUNT:-50}
    ports:
      - "127.0.0.1:${COCO_MANAGEMENT_PORT:-9090}:9090"
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    mem_limit: ${COCO_API_MEMORY_LIMIT:-768m}
    cpus: "${COCO_API_CPU_LIMIT:-1.5}"
    pids_limit: 256
    logging: *default-logging

  cloudflared:
    image: cloudflare/cloudflared:2026.7.2
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN must be set}"
    depends_on:
      api:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: ${COCO_CLOUDFLARED_MEMORY_LIMIT:-128m}
    cpus: "${COCO_CLOUDFLARED_CPU_LIMIT:-0.5}"
    pids_limit: 128
    logging: *default-logging

volumes:
  coco-postgres-production-data:
