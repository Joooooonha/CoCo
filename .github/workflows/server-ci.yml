name: Server CI

on:
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"
  workflow_dispatch:

concurrency:
  group: server-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_NAME: ghcr.io/joooooonha/coco-api

jobs:
  test:
    name: Test server
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Run server tests
        run: ./gradlew test --no-daemon

  publish:
    name: Publish ARM64 image
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: ./server
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.title=CoCo API
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=coco-api-arm64
          cache-to: type=gha,mode=max,scope=coco-api-arm64
          provenance: mode=max
          sbom: true

  deploy:
    name: Deploy to Mac mini
    if: >-
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      vars.COCO_CD_ENABLED == 'true'
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Connect to the deployment tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci

      - name: Configure restricted deployment SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.COCO_DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.COCO_DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/coco_deploy
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/coco_deploy ~/.ssh/known_hosts

      - name: Deploy immutable API image
        run: |
          ssh \
            -i ~/.ssh/coco_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            joonha@100.117.201.13 \
            "deploy sha-${GITHUB_SHA}"
